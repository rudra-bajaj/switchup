<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Player Platformer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>Two Player Platformer</h1>
      <p>Player 1: A/D to move, W to jump</p>
      <p>Player 2: Left/Right to move, Up to jump</p>
      <p>Guide both players into the green goal zone. Press R to reset.</p>
    </section>
    <canvas id="game" width="960" height="540" aria-label="Two player platformer game"></canvas>
  </main>
  <script src="game.js"></script>
</body>
</html>
